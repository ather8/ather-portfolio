<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0E2338"/>
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#5E7B93" stroke-opacity="0.2"/>

  <!-- corner registration marks -->
  <g stroke="#5E7B93" stroke-opacity="0.4" stroke-width="1.5">
    <path d="M40 70 H70 M70 40 V70"/>
    <path d="M1160 70 H1130 M1130 40 V70"/>
    <path d="M40 560 H70 M70 560 V590"/>
    <path d="M1160 560 H1130 M1130 560 V590"/>
  </g>

  <text x="90" y="120" font-family="IBM Plex Mono, monospace" font-size="16" letter-spacing="3" fill="#E8402F">FULL-STACK ENGINEER</text>

  <text x="88" y="230" font-family="Space Grotesk, sans-serif" font-size="88" font-weight="600" fill="#EAF2F9">Ather Sayed</text>

  <text x="90" y="285" font-family="IBM Plex Sans, sans-serif" font-size="24" fill="#93AEC5">
    Full-stack engineer building live production systems
  </text>

  <!-- mini status readout -->
  <g transform="translate(90, 340)">
    <rect width="500" height="220" fill="#122A42" stroke="#5E7B93" stroke-opacity="0.25"/>
    <rect width="500" height="44" fill="none" stroke="#5E7B93" stroke-opacity="0.15"/>
    <text x="20" y="28" font-family="IBM Plex Mono, monospace" font-size="12" letter-spacing="2" fill="#5E7B93">SYS / STATUS</text>
    <text x="440" y="28" font-family="IBM Plex Mono, monospace" font-size="12" letter-spacing="2" fill="#5E7B93">4 NODES</text>

    <g font-family="IBM Plex Mono, monospace" font-size="17" fill="#EAF2F9">
      <circle cx="30" cy="82" r="5" fill="#E8402F"/>
      <text x="50" y="88">Hospital System</text>
      <text x="440" y="88" font-size="12" fill="#E8402F" text-anchor="end">LIVE</text>

      <circle cx="30" cy="126" r="5" fill="#E8402F"/>
      <text x="50" y="132">PizzaStore</text>
      <text x="440" y="132" font-size="12" fill="#E8402F" text-anchor="end">LIVE</text>

      <circle cx="30" cy="170" r="5" fill="#E8402F"/>
